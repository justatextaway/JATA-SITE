      </div>

    <section class="blogs-section section">
      <h2 class="section-title">Our Blogs</h2>
      <div id="adminPostPanel" class="settings-card" style="display:none; margin-bottom: 16px;">
        <h3>Post a new blog</h3>
        <form id="postBlogForm" class="auth-form">
          <div class="form-group">
            <label for="postTitle">Title</label>
            <input id="postTitle" required placeholder="Blog title" />
          </div>
          <div class="form-group">
            <label for="postCategory">Category</label>
            <input id="postCategory" placeholder="mental-health, product, community" />
          </div>
          <div class="form-group">
            <label for="postExcerpt">Excerpt</label>
            <textarea id="postExcerpt" rows="3" placeholder="Short summary"></textarea>
          </div>
          <button type="submit" class="btn primary-btn"><i class="fas fa-plus"></i> Publish</button>
          <small class="form-help">Only admins can publish. Stored locally for demo.</small>
        </form>
      </div>
      <div class="blogs-controls">
        <div class="filters" role="tablist" aria-label="Blog categories">
          <button class="filter-btn active" data-filter="all" role="tab" aria-selected="true">All</button>
          <button class="filter-btn" data-filter="mental-health" role="tab" aria-selected="false">Mental Health</button>
          <button class="filter-btn" data-filter="product" role="tab" aria-selected="false">Product</button>
          <button class="filter-btn" data-filter="community" role="tab" aria-selected="false">Community</button>
        </div>
        <div class="search">
          <input type="search" id="blogSearch" placeholder="Search blogs..." aria-label="Search blogs" />
          <button id="blogSearchBtn" class="btn" aria-label="Search"><i class="fas fa-magnifying-glass"></i></button>
        </div>
      </div>
      <div class="blogs-container" id="blogsContainer"></div>
    </section>
